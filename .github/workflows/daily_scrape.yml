name: Daily Scrape & Deploy

# Run every day at 06:00 UTC (11:30 AM IST) and allow manual trigger
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (OCR + PDF utils)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            poppler-utils

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all scrapers
        run: python -m scrapers.run_all
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: Check scrape results
        run: |
          echo "=== Scrape Summary ==="
          python -c "
          import json, os
          path = 'data/all_openings_latest.json'
          if os.path.exists(path):
              with open(path) as f:
                  data = json.load(f)
              insts = set(r.get('institute','') for r in data)
              print(f'Total openings: {len(data)}')
              print(f'Institutes:     {len(insts)}')
          else:
              print('ERROR: all_openings_latest.json not found!')
              exit(1)
          "

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/all_openings_latest.json
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit — data is the same."
          else
            git commit -m "Auto-update data $(date -u +%Y-%m-%d)"
            git push
            echo "Data updated and pushed."
          fi
